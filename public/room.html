<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
    body { background: url('/AI.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; color: #fff; }
    .container { background: rgba(0, 0, 0, 0.65); border-radius: 15px; padding: 20px 24px; width: 420px; backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    h2 { text-align:center; margin-bottom: 8px; font-size:24px; font-weight:700; text-shadow: 1px 1px 5px rgba(0,0,0,0.7);}
    label { display:block; margin:8px 0 6px; font-weight:500; font-size: 14px; color: #ddd; }
    select { width:100%; padding:10px 12px; margin-bottom:10px; border-radius:8px; border:none; font-size:15px; background: #fff; color: #333; }

    button { width:100%; padding:10px; margin-bottom:12px; border:none; border-radius:8px; background:#ff6b81; color:#fff; font-size:15px; font-weight:500; cursor:pointer; transition: 0.2s; }
    button:hover { background:#ff4757; transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Special Green button for the Public Toggle */
    #toggleControlBtn { background: #4caf50; margin-top: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3); }
    #toggleControlBtn:hover { background: #43a047; }

    audio { width:100%; margin-top:12px; border-radius:8px; outline:none; background:rgba(255,255,255,0.04); padding:6px; display: none; }
    input[type=text], input[type=file] { width:100%; padding:10px; margin-bottom:6px; border-radius:8px; border:none; font-size:14px; }
    h3 { font-size: 16px; margin: 15px 0 10px; color: #ffeb3b; border-left: 3px solid #ff6b81; padding-left: 10px; }

    /* Upload progress */
    #uploadProgressWrap { margin-bottom: 12px; }
    .upload-progress-track { height: 6px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
    #uploadProgressBar { height: 100%; width: 0%; background: #ff6b81; transition: width 0.15s linear; }
    #uploadProgressText { font-size: 11px; color: #ccc; margin-top: 4px; text-align: right; }

    /* YouTube search results */
    #ytSearchResults { max-height: 220px; overflow-y: auto; margin-bottom: 10px; text-align: left; }
    .yt-result { display: flex; align-items: center; gap: 8px; padding: 6px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .yt-result:hover { background: rgba(255,255,255,0.08); }
    .yt-result img { width: 48px; height: 36px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .yt-result-title { font-size: 12px; color: #eee; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .yt-result-channel { font-size: 10px; color: #999; margin-top: 2px; }

    #statusMsg { font-size: 13px; text-align: center; color: #00e6c3; margin-top: 10px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }

    #ownerOnlyInterface { display: none; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 15px; padding-bottom: 5px; }

    /* ---------- Unified player card ---------- */
    .player-card { background: rgba(20,18,26,0.55); backdrop-filter: blur(14px); border-radius: 18px; padding: 18px 20px; margin-top: 16px; border: 1px solid rgba(255,255,255,0.08); }
    .player-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .album-art { width:48px; height:48px; border-radius:12px; background:linear-gradient(135deg,#7c6bf0,#4834d4); display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow: 0 4px 14px rgba(72,52,212,0.4); }
    #trackTitle { font-weight:700; font-size:16px; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .progress-bar { height:4px; background:rgba(255,255,255,0.15); border-radius:4px; cursor:pointer; position:relative; }
    .progress-bar.disabled { cursor: default; }
    .progress-fill { height:100%; background:#9b8bff; border-radius:4px; width:0%; transition: width 0.1s linear; }
    .time-row { display:flex; justify-content:space-between; font-size:11px; color:#9b9b9b; margin-top:7px; margin-bottom:14px; }
    .controls-row { display:flex; align-items:center; justify-content:center; gap:32px; }
    .ctrl-btn { background:none; border:none; color:#e6e6e6; cursor:pointer; padding:0; margin:0; width:auto; display:flex; align-items:center; justify-content:center; transition: transform 0.15s, color 0.15s; }
    .ctrl-btn:hover { color:#fff; background: none; transform: scale(1.15); }
    .ctrl-btn.play-btn { transform: scale(1.3); }
    .ctrl-btn.play-btn:hover { transform: scale(1.45); }
    .ctrl-btn.locked, .progress-bar.disabled { opacity: 0.4; pointer-events: none; }
    #ytPlayer { position:absolute; width:1px; height:1px; overflow:hidden; left:-9999px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎤 Room <span id="roomCodeDisplay"></span></h2>

    <label for="userSelect">👥 Friends in room</label>
    <select id="userSelect" size="3" style="height:80px;"></select>

    <div id="ownerOnlyInterface">
        <button id="toggleControlBtn">🔓 Allow Friends to Control</button>
    </div>

    <div id="ownerControlBlock" style="display: none;">
      <h3>🎵 Tamil Songs</h3>
      <select id="tamilSongs"><option>Loading…</option></select>
      <button id="playTamilBtn">Play Tamil Selection</button>

      <h3>🎶 English Songs</h3>
      <select id="englishSongs"><option>Loading…</option></select>
      <button id="playEnglishBtn">Play English Selection</button>

      <h3>📂 Local Files</h3>
      <input type="file" id="fileInput" accept="audio/*" />
      <button id="playLocalBtn">Upload & Play</button>
      <div id="uploadProgressWrap" style="display:none;">
        <div class="upload-progress-track"><div id="uploadProgressBar"></div></div>
        <div id="uploadProgressText">0%</div>
      </div>

      <h3>▶️ YouTube</h3>
      <input type="text" id="ytSearchInput" placeholder="Search a song on YouTube" />
      <button id="ytSearchBtn">🔍 Search</button>
      <div id="ytSearchResults"></div>
    </div>

    <div id="statusMsg">Connecting...</div>

    <div class="player-card">
      <div class="player-top">
        <div class="album-art">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
        </div>
        <div id="trackTitle">Not Playing</div>
      </div>

      <div id="progressBar" class="progress-bar disabled">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="time-row">
        <span id="curTime">0:00</span>
        <span id="durTime">0:00</span>
      </div>

      <div class="controls-row">
        <button id="prevBtn" class="ctrl-btn locked" title="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="playPauseBtn" class="ctrl-btn play-btn locked" title="Play/Pause">
          <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button id="nextBtn" class="ctrl-btn locked" title="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
        </button>
      </div>
    </div>

    <div id="ytPlayer"></div>
    <audio id="player" style="display:none;"></audio>
  </div>

  <script src="/script.js"></script>
</body>
</html>
